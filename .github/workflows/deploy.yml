name: Deploy agents app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Flutter web app
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze agents_app
        run: flutter analyze

      - name: Test agents_app
        run: flutter test

      # --pwa-strategy=none: the app registers its own service worker
      # (web/coi-serviceworker.js) for cross-origin isolation, and Flutter's
      # PWA service worker would fight it for the same scope — the two
      # replace each other forever and flutter_bootstrap never finishes
      # loading the app.
      - name: Build agents_app for GitHub Pages
        run: flutter build web --base-href "/${GITHUB_REPOSITORY#*/}/" --pwa-strategy=none

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
