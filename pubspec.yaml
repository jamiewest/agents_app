name: agents_app
description: Demonstrates the agents_flutter chat UI.
publish_to: none
version: 0.0.1
repository: https://github.com/jamiewest/agents_app

environment:
  sdk: ^3.12.0

dependencies:
  a2a: ^4.2.0
  agents: ^1.5.0
  agents_flutter:
    git:
      url: https://github.com/jamiewest/agents.git
      ref: 65111a0e61e5f02f41a61a50a04d1baab4ac167c
      path: packages/agents_flutter
  animations: ^2.2.0
  anthropic_sdk_dart: ^5.0.0
  camera_macos: ^0.1.0
  characters: ^1.4.1
  cross_file: ^0.3.5+2
  cupertino_icons: ^1.0.8
  extensions: ^0.5.0
  extensions_flutter: ^0.4.6
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_context_menu: ^0.4.2
  flutter_markdown_plus: ^1.0.7
  flutter_picture_taker: ^0.2.0
  flutter_test:
    sdk: flutter
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  http: ^1.6.0
  image_picker: ^1.2.2
  llama_cpp_flutter: ^0.5.0
  material_symbols_icons: ^4.2951.0
  mime: ^2.0.0
  mobile_scanner: ^7.2.0
  path: ^1.9.0
  path_provider: ^2.1.6
  pool: ^1.5.2
  qr_flutter: ^4.1.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  sqflite: ^2.4.2
  sqflite_common: ^2.5.6
  universal_platform: ^1.1.0
  url_launcher: ^6.3.2
  waveform_recorder: ^1.8.0
  web: ^1.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4

# agents_flutter (git) depends on agents through an in-repo path, while
# llama_cpp_flutter needs the hosted release; pin the hosted package so the
# two sources agree.
dependency_overrides:
  agents: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    # Bundled Outfit weights (400/500/600). google_fonts prefers these over
    # runtime fetching, so typography is identical offline.
    - assets/google_fonts/
